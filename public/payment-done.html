<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تم الدفع بنجاح</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #1a0000);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  text-align: center;
}

.card {
  background: #1c1c1c;
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 0 20px rgba(255,0,0,0.3);
  max-width: 400px;
}

h1 {
  color: #00e676;
  margin-bottom: 10px;
}

p {
  color: #ccc;
  margin-bottom: 20px;
}

.btn {
  display: inline-block;
  padding: 10px 20px;
  background: #e53935;
  color: white;
  text-decoration: none;
  border-radius: 8px;
}

.btn:hover {
  background: #c62828;
}
</style>

</head>

<body>

<div class="card">
  <h1>✔ تم الدفع بنجاح</h1>
  <p>شكراً لاستخدامك Karawan Cinema 🎬</p>
  <p>سيتم تحويلك تلقائيًا بعد ثواني...</p>

  <a href="booking.html" class="btn">العودة للحجز</a>
</div>

<script>
setTimeout(() => {
  window.location.href = "booking.html";
}, 4000);
</script>

</body>
</html>
